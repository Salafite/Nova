<style>
body {
    background-color: #F9FAFB;
    color: #141B2B;
}
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
}
.active-tab {
    background-color: #5d3fd3;
    color: #d8ceff;
}
.erp-table tr:hover {
    background-color: rgba(69, 30, 187, 0.02);
}
.surface-card {
    background-color: #FFFFFF;
    border: 1px solid #E5E7EB;
}
.press-effect:active {
    transform: scale(0.98);
}
html[dir="rtl"] .ml-\[240px\] { margin-left: 0; margin-right: 240px; }
html[dir="rtl"] .fixed.left-0 { left: auto; right: 0; }
html[dir="rtl"] aside { border-right: none; border-left: 1px solid #c9c4d7; }
html[dir="rtl"] .pl-xl { padding-left: 16px; padding-right: 32px; }
html[dir="rtl"] .absolute.left-sm { left: auto; right: 8px; }
html[dir="rtl"] .text-right { text-align: left; }
html[dir="rtl"] #content::-webkit-scrollbar { display: none; }
html[dir="rtl"] #content { scrollbar-width: none; }

.auth-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #F9FAFB;
    z-index: 9999;
    display: none;
    overflow-y: auto;
}
.auth-overlay.active {
    display: block;
}
</style>

<body class="font-body-md text-body-md overflow-hidden h-screen flex transition-all duration-300">

<div class="app-shell flex w-full h-full" style="display:none;">
    <!-- NavigationDrawer -->
    <aside class="fixed left-0 top-[64px] h-[calc(100vh-64px)] w-[240px] border-r border-outline-variant bg-surface flex flex-col py-lg z-40 transition-transform duration-300" id="navigation-drawer">
        <nav class="flex-1 space-y-xs overflow-y-auto" id="nav"></nav>
    </aside>

    <!-- Main Content Area -->
    <main class="ml-0 lg:ml-[240px] flex-1 flex flex-col h-screen pt-[64px] bg-background transition-all duration-300">
        <!-- TopAppBar -->
        <header class="fixed left-0 top-0 flex justify-between items-center w-full px-margin-desktop h-[64px] bg-surface-container-lowest border-b border-outline-variant z-50">
            <div class="flex items-center gap-md">
                <button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors press-effect p-xs hover:bg-surface-container-low rounded-full" onclick="app.toggleSidebar()">menu</button>
                <span class="font-headline-lg text-[24px] font-bold text-primary mr-md lg:mr-xl hidden sm:block">Nova ERP</span>
                <h1 class="font-title-md text-title-md text-on-surface-variant font-medium sm:border-l sm:border-outline-variant sm:pl-md" id="page-title"></h1>
            </div>
            <div class="flex items-center gap-lg">
                <!-- Search Bar -->
                <div class="relative hidden lg:block w-96 group">
                    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">search</span>
                    <input class="w-full pl-xl pr-md py-xs bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none text-body-md" id="globalSearch" placeholder="Search modules..." oninput="app.search(this.value)" type="text"/>
                </div>
                <div class="flex items-center gap-md">
                    <!-- Language Toggle -->
                    <button class="flex items-center gap-xs text-label-md font-bold text-on-surface-variant hover:text-primary transition-colors press-effect bg-surface-container-low px-sm py-xs rounded-lg border border-outline-variant" onclick="app.toggleLang()">
                        <span id="lang-label">EN/AR</span>
                    </button>
                    
                    <span class="font-label-md text-on-surface-variant" id="userRole"></span>
                    <button id="lblLogoutBtn" class="font-label-md text-error hover:underline transition-colors press-effect p-xs" onclick="app.logout()">Logout</button>
                </div>
            </div>
        </header>

        <!-- Scrollable Dashboard Content -->
        <div class="flex-1 overflow-y-auto p-margin-desktop space-y-lg" id="content"></div>
    </main>
</div>

<div class="auth-overlay" id="authOverlay"></div>
