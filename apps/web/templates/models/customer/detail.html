<h2>{{name}}</h2>
<div class="grid-2">
  <div class="card">
    <div class="card-header">Customer Details</div>
    <table>
      <tr><td>Email</td><td>{{email}}</td></tr>
      <tr><td>Phone</td><td>{{phone}}</td></tr>
      <tr><td>Credit Limit</td><td>${{creditLimit}}</td></tr>
      <tr><td>Balance</td><td>${{balance}}</td></tr>
    </table>
  </div>
  <div class="card">
    <div class="card-header">Actions</div>
    <p><button class="btn btn-primary" onclick="controllers.customers.showEditForm('{{id}}')">Edit</button></p>
    <p><button class="btn btn-outline" onclick="app.loadModule('customers')">Back to List</button></p>
  </div>
</div>
