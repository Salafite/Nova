<div class="flex flex-col h-full">
<!-- Dashboard Header & Actions -->
<div class="px-margin-desktop py-lg flex justify-between items-end">
<div>
<nav class="flex items-center gap-xs text-[10px] text-on-surface-variant uppercase tracking-widest mb-xs">
<span>CRM</span>
<span class="material-symbols-outlined text-[12px] opacity-40">chevron_right</span>
<span class="text-primary font-bold">Customer Directory</span>
</nav>
<h3 class="font-headline-lg text-headline-lg text-on-background">Customers</h3>
</div>
<div class="flex gap-sm">
<div class="flex rounded-lg overflow-hidden border border-outline-variant bg-surface-container-lowest hidden md:flex">
<button class="px-md py-2 bg-surface-container-high text-primary flex items-center gap-xs border-r border-outline-variant">
<span class="material-symbols-outlined text-[20px]">list</span>
<span class="font-label-md text-label-md">List</span>
</button>
<button class="px-md py-2 hover:bg-surface-variant text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[20px]">grid_view</span>
<span class="font-label-md text-label-md">Kanban</span>
</button>
</div>
<button class="flex items-center gap-xs px-md py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant/20 press-effect hidden md:flex">
<span class="material-symbols-outlined text-[20px]">filter_list</span>
<span>Filters</span>
</button>
<button class="flex items-center gap-xs px-md py-2 bg-primary text-on-primary rounded-lg font-label-md text-label-md hover:brightness-110 press-effect" onclick="controllers.customers.showAddForm()">
<span class="material-symbols-outlined text-[20px]">add</span>
<span>Add Customer</span>
</button>
</div>
</div>

<!-- High-Density Content Area -->
<div class="flex-1 px-margin-desktop pb-xl overflow-hidden flex flex-col">
<!-- Data Table Container -->
<div class="bg-surface-container-lowest rounded-xl overflow-hidden flex flex-col h-full shadow-sm border border-outline-variant">
<!-- Local Search -->
<div class="p-md border-b border-outline-variant bg-surface-container-low flex justify-between items-center">
<div class="relative max-w-md w-full">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
<input type="text" id="customerSearch" class="w-full bg-surface-container-lowest border border-outline-variant rounded-full pl-10 pr-4 py-2 font-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary text-on-surface outline-none" placeholder="Search customers..." oninput="controllers.customers.search(this.value)">
</div>
</div>
<div class="overflow-x-auto custom-scrollbar flex-1">
<table class="w-full text-left rtl:text-right border-collapse">
<thead>
<tr class="bg-surface-container-low border-b border-outline-variant">
<th class="p-md w-12"><input class="rounded border-outline text-primary focus:ring-primary/20" type="checkbox"/></th>
<th class="p-md font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Customer Name</th>
<th class="p-md font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Group</th>
<th class="p-md font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Contact Info</th>
<th class="p-md font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Status</th>
<th class="p-md font-label-md text-label-md text-on-surface-variant uppercase tracking-wider text-right rtl:text-left">Outstanding Balance</th>
<th class="p-md w-12 text-center"></th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant" id="customerTableBody">
{{rows}}
</tbody>
</table>
</div>
<!-- Pagination Footer -->
<div class="mt-auto border-t border-outline-variant bg-surface-container-lowest px-md py-sm flex justify-between items-center">
<div class="text-xs text-on-surface-variant" id="customerPaginationText">
    Showing <span class="font-bold">{{count}}</span> customers
</div>
<div class="flex items-center gap-base">
<button class="p-2 hover:bg-surface-variant rounded transition-colors text-on-surface-variant disabled:opacity-30" disabled="">
<span class="material-symbols-outlined rtl-flip">chevron_left</span>
</button>
<button class="w-8 h-8 flex items-center justify-center bg-primary text-on-primary rounded font-label-md text-label-md">1</button>
<button class="p-2 hover:bg-surface-variant rounded transition-colors text-on-surface-variant disabled:opacity-30" disabled="">
<span class="material-symbols-outlined rtl-flip">chevron_right</span>
</button>
</div>
</div>
</div>
</div>
</div>
