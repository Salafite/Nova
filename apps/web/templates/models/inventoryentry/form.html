<h2>Move Stock</h2>
<div class="card">
  <form id="invMoveForm" onsubmit="return controllers.inventory.saveMove()">
    <div class="form-group">
      <label>Product ID</label>
      <input type="text" id="invMoveProduct" value="{{productId}}" required>
    </div>
    <div class="form-group">
      <label>Quantity</label>
      <input type="number" id="invMoveQty" value="0" required>
    </div>
    <div class="form-group">
      <label>From Location</label>
      <input type="text" id="invMoveFrom" value="{{fromLocation}}">
    </div>
    <div class="form-group">
      <label>To Location</label>
      <input type="text" id="invMoveTo" value="{{toLocation}}">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Move</button>
      <button type="button" class="btn btn-outline" onclick="app.loadModule('inventory')">Cancel</button>
    </div>
  </form>
</div>
