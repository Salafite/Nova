<h2>{{name}}</h2>
<div class="grid-2">
  <div class="card">
    <div class="card-header">Product Details</div>
    <table>
      <tr><td>SKU</td><td>{{sku}}</td></tr>
      <tr><td>Category</td><td>{{category}}</td></tr>
      <tr><td>Price</td><td>${{price}}</td></tr>
      <tr><td>Stock</td><td>{{stock}}</td></tr>
    </table>
  </div>
  <div class="card">
    <div class="card-header">Actions</div>
    <p><button class="btn btn-primary" onclick="controllers.products.showEditForm('{{id}}')">Edit</button></p>
    <p><button class="btn btn-outline" onclick="app.loadModule('products')">Back to List</button></p>
  </div>
</div>
