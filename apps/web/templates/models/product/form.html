<div class="max-w-2xl mx-auto py-xl">
  <div class="flex items-center gap-sm mb-lg">
    <button class="w-10 h-10 rounded-full hover:bg-surface-variant/50 flex items-center justify-center text-on-surface-variant transition-colors" onclick="app.loadModule('products')">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h2 class="font-headline-md text-headline-md text-on-surface">{{title}} Product</h2>
  </div>

  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-xl">
    <form id="productForm" onsubmit="return controllers.products.saveForm()" class="space-y-md">
      <input type="hidden" id="productFormId" value="{{id}}">
      
      <div>
        <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Name</label>
        <input type="text" id="productFormName" value="{{name}}" required class="w-full px-md py-sm border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary text-body-md outline-none transition-all">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">SKU</label>
          <input type="text" id="productFormSku" value="{{sku}}" class="w-full px-md py-sm border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary text-body-md outline-none transition-all">
        </div>
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Category</label>
          <input type="text" id="productFormCategory" value="{{category}}" class="w-full px-md py-sm border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary text-body-md outline-none transition-all">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Price ($)</label>
          <input type="number" id="productFormPrice" value="{{price}}" step="0.01" required class="w-full px-md py-sm border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary text-body-md outline-none transition-all">
        </div>
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Stock Level</label>
          <input type="number" id="productFormStock" value="{{stock}}" class="w-full px-md py-sm border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary text-body-md outline-none transition-all">
        </div>
      </div>

      <div class="pt-lg mt-lg border-t border-outline-variant flex justify-end gap-sm">
        <button type="button" class="px-lg py-sm rounded-lg font-label-md text-label-md text-primary hover:bg-primary-container/20 transition-colors" onclick="app.loadModule('products')">Cancel</button>
        <button type="submit" class="px-lg py-sm bg-primary text-on-primary rounded-lg font-label-md text-label-md hover:bg-primary/90 transition-colors shadow-sm">Save Product</button>
      </div>
    </form>
  </div>
</div>
