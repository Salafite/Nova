<h2>{{title}}</h2>
<div class="card">
  <form id="supplierForm" onsubmit="return controllers.suppliers.saveForm()">
    <input type="hidden" id="supplierFormId" value="{{id}}">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="supplierFormName" value="{{name}}" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="supplierFormEmail" value="{{email}}">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" id="supplierFormPhone" value="{{phone}}">
    </div>
    <div class="form-group">
      <label>Payment Terms</label>
      <input type="text" id="supplierFormTerms" value="{{paymentTerms}}">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save</button>
      <button type="button" class="btn btn-outline" onclick="app.loadModule('suppliers')">Cancel</button>
    </div>
  </form>
</div>
