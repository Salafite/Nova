<div class="max-w-max-width mx-auto flex flex-col h-full space-y-xl">
<div class="flex justify-between items-end mb-lg mt-lg">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Document Management</h2>
<p class="text-body-md text-on-surface-variant mt-1">Upload, organize, and manage documents across the enterprise.</p>
</div>
<div class="flex gap-sm">
<button class="bg-primary text-on-primary px-lg py-sm rounded-lg flex items-center justify-center gap-xs font-label-md active:translate-y-[1px] transition-all press-effect" onclick="controllers.documents.showCreateForm()">
<span class="material-symbols-outlined text-[18px]">upload</span>
Upload Document
</button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter mb-xl">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col justify-between shadow-sm">
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label-md uppercase tracking-wider">Total Documents</span>
<span class="material-symbols-outlined text-primary">description</span>
</div>
<div class="flex items-baseline gap-sm mt-2">
<span class="font-headline-lg text-headline-lg text-on-surface">{{totalDocuments}}</span>
<span class="text-body-md text-on-surface-variant">files</span>
</div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col justify-between shadow-sm">
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label-md uppercase tracking-wider">Total Size</span>
<span class="material-symbols-outlined text-secondary">storage</span>
</div>
<div class="flex items-baseline gap-sm mt-2">
<span class="font-headline-lg text-headline-lg text-secondary">{{totalSize}}</span>
<span class="text-body-md text-on-surface-variant">bytes</span>
</div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col justify-between shadow-sm">
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label-md uppercase tracking-wider">Published</span>
<span class="material-symbols-outlined text-primary">publish</span>
</div>
<div class="flex items-baseline gap-sm mt-2">
<span class="font-headline-lg text-headline-lg text-primary">{{publishedDocs}}</span>
<span class="text-body-md text-on-surface-variant">documents</span>
</div>
</div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h3 class="font-title-md text-title-md font-bold">Documents</h3>
<div class="flex gap-sm">
<input type="text" id="documentSearch" placeholder="Search documents..." class="px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md outline-none focus:border-primary text-body-md" oninput="controllers.documents.search(this.value)">
</div>
</div>
<div class="overflow-x-auto flex-1">
<table class="w-full text-left border-collapse erp-table">
<thead class="bg-surface-container-low border-b border-outline-variant">
<tr>
<th class="px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Name</th>
<th class="px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Type</th>
<th class="px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Size</th>
<th class="px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Uploaded By</th>
<th class="px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Date</th>
<th class="px-lg py-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Status</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{documentRows}}
</tbody>
</table>
</div>
</div>
</div>
