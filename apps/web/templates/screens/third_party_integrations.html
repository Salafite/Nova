<div class="max-w-max-width mx-auto flex flex-col h-full space-y-xl">
<div class="flex justify-between items-end mb-lg mt-lg">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Third-Party Integrations</h2>
<p class="text-body-md text-on-surface-variant mt-1">Manage payment gateways, shipping providers, and external services.</p>
</div>
<div class="flex gap-sm">
<button class="bg-primary text-on-primary px-lg py-sm rounded-lg flex items-center justify-center gap-xs font-label-md active:translate-y-[1px] transition-all press-effect" onclick="controllers.integrations.showCreateForm()">
<span class="material-symbols-outlined text-[18px]">add</span>
Add Integration
</button>
</div>
</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter mb-xl items-stretch">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h3 class="font-title-md text-title-md font-bold">Payment Gateways</h3>
<span class="font-data-mono text-data-mono text-on-surface-variant">{{gatewayCount}} gateways</span>
</div>
<div class="overflow-x-auto flex-1">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
<tr>
<th class="px-lg py-sm font-semibold">Gateway</th>
<th class="px-lg py-sm font-semibold">Type</th>
<th class="px-lg py-sm font-semibold text-center">Status</th>
<th class="px-lg py-sm font-semibold">Last Transaction</th>
<th class="px-lg py-sm font-semibold text-center">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{integrationRows}}
</tbody>
</table>
</div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h3 class="font-title-md text-title-md font-bold">Shipping Providers</h3>
<span class="font-data-mono text-data-mono text-on-surface-variant">{{shippingCount}} providers</span>
</div>
<div class="overflow-x-auto flex-1">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
<tr>
<th class="px-lg py-sm font-semibold">Provider</th>
<th class="px-lg py-sm font-semibold">Account</th>
<th class="px-lg py-sm font-semibold text-center">Status</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{shippingRows}}
</tbody>
</table>
</div>
</div>
</div>
</div>
