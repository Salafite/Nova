<div class="max-w-2xl mx-auto py-xl">
  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden">
    <div class="px-lg py-md border-b border-outline-variant bg-surface-container-low">
      <h3 class="font-title-md text-title-md font-bold">{{title}}</h3>
    </div>
    <form onsubmit="return controllers.payment_terms.saveForm()" class="p-lg space-y-lg">
      <input type="hidden" id="paymentTermFormId" value="{{id}}">
      <div class="grid grid-cols-2 gap-lg">
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Name</label>
          <input type="text" id="paymentTermFormName" value="{{name}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Code</label>
          <input type="text" id="paymentTermFormCode" value="{{code}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Due Days</label>
          <input type="number" id="paymentTermFormDueDays" value="{{dueDays}}" min="0" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Discount %</label>
          <input type="number" id="paymentTermFormDiscountPct" value="{{discountPercentage}}" min="0" max="100" step="0.01" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Discount Days</label>
          <input type="number" id="paymentTermFormDiscountDays" value="{{discountDays}}" min="0" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Is Default</label>
          <div class="flex items-center h-full pt-1">
            <input type="checkbox" id="paymentTermFormIsDefault" {{isDefault}} class="rounded border-outline text-primary focus:ring-primary/20 w-5 h-5">
          </div>
        </div>
      </div>
      <div class="flex flex-col gap-xs">
        <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Description</label>
        <textarea id="paymentTermFormDescription" rows="3" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">{{description}}</textarea>
      </div>
      <div class="flex justify-end gap-sm pt-md border-t border-outline-variant">
        <button type="button" class="px-4 py-2 border border-outline-variant rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors" onclick="controllers.payment_terms.render()">Cancel</button>
        <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-lg hover:opacity-90 transition-all press-effect">Save</button>
      </div>
    </form>
  </div>
</div>
