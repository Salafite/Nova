<div class="max-w-max-width mx-auto flex flex-col h-full space-y-xl">
  <div class="flex justify-between items-end mb-lg mt-lg">
    <div>
      <h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Leads</h2>
      <p class="text-body-md text-on-surface-variant mt-1">Manage lead generation and qualification pipeline.</p>
    </div>
    <div class="flex gap-sm">
      <button class="bg-primary text-on-primary px-lg py-sm rounded-lg flex items-center justify-center gap-xs font-label-md active:translate-y-[1px] transition-all press-effect" onclick="controllers.leads.showCreateForm()">
        <span class="material-symbols-outlined text-[18px]">person_add</span>
        <span>Add Lead</span>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-4 gap-gutter mb-xl">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm">
      <div class="text-data-mono text-2xl font-bold text-primary">{{total}}</div>
      <div class="text-xs text-on-surface-variant mt-1">Total Leads</div>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm">
      <div class="text-data-mono text-2xl font-bold text-warning">{{newCount}}</div>
      <div class="text-xs text-on-surface-variant mt-1">New</div>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm">
      <div class="text-data-mono text-2xl font-bold text-success">{{qualified}}</div>
      <div class="text-xs text-on-surface-variant mt-1">Qualified</div>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm">
      <div class="text-data-mono text-2xl font-bold text-secondary">{{converted}}</div>
      <div class="text-xs text-on-surface-variant mt-1">Converted</div>
    </div>
  </div>

  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
    <div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
      <h3 class="font-title-md text-title-md font-bold">Lead Directory</h3>
      <div class="flex gap-sm">
        <input class="w-64 px-md py-xs bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none text-body-md" id="leadSearch" placeholder="Search leads..." oninput="controllers.leads.search(this.value)" type="text"/>
      </div>
    </div>
    <div class="overflow-x-auto flex-1">
      <table class="w-full text-left border-collapse erp-table">
        <thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
          <tr>
            <th class="px-lg py-sm font-semibold">Name</th>
            <th class="px-lg py-sm font-semibold">Email</th>
            <th class="px-lg py-sm font-semibold">Company</th>
            <th class="px-lg py-sm font-semibold">Source</th>
            <th class="px-lg py-sm font-semibold">Status</th>
            <th class="px-lg py-sm font-semibold text-center">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-outline-variant">
          {{rows}}
        </tbody>
      </table>
    </div>
  </div>
</div>
