<div class="max-w-max-width mx-auto flex flex-col h-full space-y-xl">
<div class="flex justify-between items-end mb-lg mt-lg">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Notifications</h2>
<p class="text-body-md text-on-surface-variant">In-app notification center.</p>
</div>
<div class="flex gap-sm">
<button class="bg-primary text-on-primary px-lg py-sm rounded-lg flex items-center gap-xs font-label-md press-effect {{hasUnread}}" onclick="controllers.notifications.markAll()">
<span class="material-symbols-outlined text-[18px]">mark_email_read</span> Mark All Read
</button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter mb-xl">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm"><p class="font-label-md text-on-surface-variant uppercase tracking-wider mb-xs">Total</p><p class="font-headline-lg text-headline-lg text-primary">{{total}}</p></div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm"><p class="font-label-md text-on-surface-variant uppercase tracking-wider mb-xs">Unread</p><p class="font-headline-lg text-headline-lg text-error">{{unread}}</p></div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm"><p class="font-label-md text-on-surface-variant uppercase tracking-wider mb-xs">Search</p><input class="w-full px-md py-sm bg-surface-container-low border border-outline-variant rounded-lg text-body-md" id="notificationSearch" placeholder="Search by title..." oninput="controllers.notifications.search(this.value)" type="text"/></div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden shadow-sm flex flex-col">
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-low border-b border-outline-variant">
<tr>
<th class="px-lg py-3 font-label-md text-label-md text-on-surface-variant font-semibold uppercase tracking-wider"></th>
<th class="px-lg py-3 font-label-md text-label-md text-on-surface-variant font-semibold uppercase tracking-wider">Title</th>
<th class="px-lg py-3 font-label-md text-label-md text-on-surface-variant font-semibold uppercase tracking-wider">Message</th>
<th class="px-lg py-3 font-label-md text-label-md text-on-surface-variant font-semibold uppercase tracking-wider">Type</th>
<th class="px-lg py-3 font-label-md text-label-md text-on-surface-variant font-semibold uppercase tracking-wider">Reference</th>
<th class="px-lg py-3 font-label-md text-label-md text-on-surface-variant font-semibold uppercase tracking-wider">Date</th>
<th class="px-lg py-3 font-label-md text-label-md text-on-surface-variant font-semibold uppercase tracking-wider text-center">Read</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{rows}}
</tbody>
</table>
</div>
</div>
</div>
