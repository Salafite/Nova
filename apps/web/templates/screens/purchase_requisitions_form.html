<div class="max-w-2xl mx-auto mt-xl">
  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl shadow-sm">
    <div class="flex items-center gap-sm mb-lg">
      <span class="material-symbols-outlined text-primary text-[24px]">description</span>
      <h2 class="font-headline-sm text-headline-sm text-on-surface">{{title}}</h2>
    </div>
    <form onsubmit="return controllers.purchase_requisitions.saveForm()">
      <input type="hidden" id="reqFormId" value="{{id}}">

      <div class="grid grid-cols-2 gap-gutter">
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Req Number</label>
          <input type="text" id="reqFormNumber" value="{{reqNumber}}" readonly class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-3 py-2 text-body-md">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Priority</label>
          <select id="reqFormPriority" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
            <option value="Low" {{priority === 'Low' ? 'selected' : ''}}>Low</option>
            <option value="Medium" {{priority === 'Medium' ? 'selected' : ''}}>Medium</option>
            <option value="High" {{priority === 'High' ? 'selected' : ''}}>High</option>
            <option value="Urgent" {{priority === 'Urgent' ? 'selected' : ''}}>Urgent</option>
          </select>
        </div>
      </div>

      <div class="flex flex-col gap-xs mt-md">
        <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Title</label>
        <input type="text" id="reqFormTitle" value="{{title}}" placeholder="What is needed?" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
      </div>

      <div class="flex flex-col gap-xs mt-md">
        <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Description</label>
        <textarea id="reqFormDesc" rows="3" placeholder="Justification and details..." class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">{{description}}</textarea>
      </div>

      <div class="flex flex-col gap-xs mt-md">
        <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Department ID</label>
        <input type="number" id="reqFormDept" value="{{departmentId}}" placeholder="Department code" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
      </div>

      <div class="flex flex-col gap-xs mt-md">
        <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Notes</label>
        <textarea id="reqFormNotes" rows="2" placeholder="Additional notes..." class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">{{notes}}</textarea>
      </div>

      <div class="flex justify-end gap-sm mt-xl">
        <button type="button" class="bg-surface-container-high text-on-surface px-lg py-sm rounded-lg font-label-md" onclick="controllers.purchase_requisitions.render(); controllers.purchase_requisitions.mount()">Cancel</button>
        <button type="submit" class="bg-primary text-on-primary px-lg py-sm rounded-lg font-label-md flex items-center gap-xs">
          <span class="material-symbols-outlined text-[18px]">save</span>
          Save
        </button>
      </div>
    </form>
  </div>
</div>
