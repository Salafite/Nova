<div class="max-w-max-width mx-auto flex flex-col h-full space-y-xl">
<div class="flex justify-between items-end mb-lg mt-lg">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Public API Platform</h2>
<p class="text-body-md text-on-surface-variant mt-1">Manage API keys, monitor usage, and explore available endpoints.</p>
</div>
<div class="flex gap-sm">
<button class="bg-primary text-on-primary px-lg py-sm rounded-lg flex items-center justify-center gap-xs font-label-md active:translate-y-[1px] transition-all press-effect" onclick="controllers.api.showCreateForm()">
<span class="material-symbols-outlined text-[18px]">vpn_key</span>
Create API Key
</button>
</div>
</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter mb-xl items-stretch">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h3 class="font-title-md text-title-md font-bold">API Keys</h3>
<span class="font-data-mono text-data-mono text-on-surface-variant">{{keyCount}} keys</span>
</div>
<div class="overflow-x-auto flex-1">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
<tr>
<th class="px-lg py-sm font-semibold">Name</th>
<th class="px-lg py-sm font-semibold">Key</th>
<th class="px-lg py-sm font-semibold">Created</th>
<th class="px-lg py-sm font-semibold">Last Used</th>
<th class="px-lg py-sm font-semibold text-center">Status</th>
<th class="px-lg py-sm font-semibold text-center">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{keyRows}}
</tbody>
</table>
</div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h3 class="font-title-md text-title-md font-bold">API Endpoints</h3>
<span class="font-data-mono text-data-mono text-on-surface-variant">{{endpointCount}} endpoints</span>
</div>
<div class="overflow-x-auto flex-1">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
<tr>
<th class="px-lg py-sm font-semibold">Method</th>
<th class="px-lg py-sm font-semibold">Path</th>
<th class="px-lg py-sm font-semibold">Description</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{endpointRows}}
</tbody>
</table>
</div>
</div>
</div>
</div>
