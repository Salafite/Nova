<div class="max-w-2xl mx-auto py-xl">
  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden">
    <div class="px-lg py-md border-b border-outline-variant bg-surface-container-low">
      <h3 class="font-title-md text-title-md font-bold">{{title}}</h3>
    </div>
    <form onsubmit="return controllers.invoices.saveForm()" class="p-lg space-y-lg">
      <input type="hidden" id="invoiceFormId" value="{{id}}">
      <input type="hidden" id="invoiceFormStatus" value="{{status}}">
      <div class="grid grid-cols-2 gap-lg">
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Invoice Number</label>
          <input type="text" id="invoiceFormNumber" value="{{invoiceNumber}}" readonly class="w-full bg-surface-variant border border-outline-variant rounded-lg px-3 py-2 text-body-md">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Type</label>
          <select id="invoiceFormType" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
            <option value="Sales" {{selSales}}>Sales</option>
            <option value="Purchase" {{selPurchase}}>Purchase</option>
          </select>
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Partner ID</label>
          <input type="number" id="invoiceFormPartnerId" value="{{partnerId}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Issue Date</label>
          <input type="date" id="invoiceFormIssueDate" value="{{issueDate}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Due Date</label>
          <input type="date" id="invoiceFormDueDate" value="{{dueDate}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Total Amount</label>
          <input type="number" step="0.01" id="invoiceFormTotalAmount" value="{{totalAmount}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
      </div>
      <div class="flex flex-col gap-xs">
        <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Notes</label>
        <textarea id="invoiceFormNotes" rows="3" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">{{notes}}</textarea>
      </div>
      <div class="flex justify-end gap-sm pt-md border-t border-outline-variant">
        <button type="button" class="px-4 py-2 border border-outline-variant rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors" onclick="controllers.invoices.render()">Cancel</button>
        <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-lg hover:opacity-90 transition-all press-effect">Save</button>
      </div>
    </form>
  </div>
</div>
