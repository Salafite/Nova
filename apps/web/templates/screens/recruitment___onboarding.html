<div class="max-w-max-width mx-auto flex flex-col h-full space-y-xl">
  <div class="flex justify-between items-end mb-lg mt-lg">
    <div>
      <h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Recruitment & Onboarding</h2>
      <p class="text-body-md text-on-surface-variant mt-1">Track candidates, interviews, and onboarding progress.</p>
    </div>
    <div class="flex gap-sm">
      <button class="bg-primary text-on-primary px-lg py-sm rounded-lg flex items-center justify-center gap-xs font-label-md active:translate-y-[1px] transition-all press-effect" onclick="controllers.recruitment.showCreateForm()">
        <span class="material-symbols-outlined text-[18px]">add</span>
        New Application
      </button>
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-gutter mb-xl">
    <div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl shadow-sm">
      <p class="text-on-surface-variant font-label-md text-label-md uppercase tracking-wider">Active Candidates</p>
      <p class="font-display-lg text-[28px] leading-tight text-primary font-bold font-data-mono mt-1">{{activeCount}}</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl shadow-sm">
      <p class="text-on-surface-variant font-label-md text-label-md uppercase tracking-wider">In Interview</p>
      <p class="font-display-lg text-[28px] leading-tight text-secondary font-bold font-data-mono mt-1">{{interviewCount}}</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl shadow-sm">
      <p class="text-on-surface-variant font-label-md text-label-md uppercase tracking-wider">Hired</p>
      <p class="font-display-lg text-[28px] leading-tight text-on-surface font-bold font-data-mono mt-1">{{hiredCount}}</p>
    </div>
  </div>
  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
    <div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
      <h3 class="font-title-md text-title-md font-bold">Candidates</h3>
      <div class="flex gap-sm">
        <button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors press-effect p-xs rounded-full hover:bg-surface-container-high" onclick="controllers.recruitment.refresh()">refresh</button>
        <input id="recSearch" oninput="controllers.recruitment.search(this.value)" placeholder="Search..." class="bg-surface border border-outline-variant rounded-lg px-3 py-1.5 text-body-sm focus:ring-2 focus:ring-primary/20" />
      </div>
    </div>
    <div class="overflow-x-auto flex-1">
      <table class="w-full text-left border-collapse erp-table">
        <thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
          <tr>
            <th class="px-lg py-sm font-semibold">Candidate</th>
            <th class="px-lg py-sm font-semibold">Position</th>
            <th class="px-lg py-sm font-semibold">Stage</th>
            <th class="px-lg py-sm font-semibold">Applied Date</th>
            <th class="px-lg py-sm font-semibold text-center">Status</th>
            <th class="px-lg py-sm font-semibold text-center">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-outline-variant">{{rows}}</tbody>
      </table>
    </div>
  </div>
</div>
