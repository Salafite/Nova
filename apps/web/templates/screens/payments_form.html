<div class="max-w-2xl mx-auto py-xl">
  <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden">
    <div class="px-lg py-md border-b border-outline-variant bg-surface-container-low">
      <h3 class="font-title-md text-title-md font-bold">{{title}}</h3>
    </div>
    <form onsubmit="return controllers.payments.saveForm()" class="p-lg space-y-lg">
      <input type="hidden" id="paymentFormId" value="{{id}}">
      <input type="hidden" id="paymentFormStatus" value="{{status}}">
      <div class="grid grid-cols-2 gap-lg">
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Payment Date</label>
          <input type="date" id="paymentFormDate" value="{{paymentDate}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Payment Method</label>
          <select id="paymentFormMethod" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
            <option value="Cash" {{selCash}}>Cash</option>
            <option value="Bank Transfer" {{selBankTransfer}}>Bank Transfer</option>
            <option value="Card" {{selCard}}>Card</option>
            <option value="Check" {{selCheck}}>Check</option>
          </select>
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Invoice ID</label>
          <input type="number" id="paymentFormInvoiceId" value="{{invoiceId}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Partner ID</label>
          <input type="number" id="paymentFormPartnerId" value="{{partnerId}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Amount</label>
          <input type="number" step="0.01" id="paymentFormAmount" value="{{amount}}" required class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Reference</label>
          <input type="text" id="paymentFormReference" value="{{reference}}" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">
        </div>
      </div>
      <div class="flex flex-col gap-xs">
        <label class="font-label-sm text-label-sm font-bold text-on-surface-variant uppercase">Notes</label>
        <textarea id="paymentFormNotes" rows="3" class="w-full bg-surface border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:ring-2 focus:ring-primary/20">{{notes}}</textarea>
      </div>
      <div class="flex justify-end gap-sm pt-md border-t border-outline-variant">
        <button type="button" class="px-4 py-2 border border-outline-variant rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors" onclick="controllers.payments.render()">Cancel</button>
        <button type="submit" class="px-4 py-2 bg-primary text-on-primary rounded-lg hover:opacity-90 transition-all press-effect">Save</button>
      </div>
    </form>
  </div>
</div>
