<div class="max-w-max-width mx-auto flex flex-col h-full space-y-xl">
<div class="flex justify-between items-end mb-lg mt-lg">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Mobile Platform</h2>
<p class="text-body-md text-on-surface-variant mt-1">Manage device sessions and monitor sync activity.</p>
</div>
<div class="flex gap-sm">
<button class="bg-primary text-on-primary px-lg py-sm rounded-lg flex items-center justify-center gap-xs font-label-md active:translate-y-[1px] transition-all press-effect" onclick="controllers.mobile.showCreateForm()">
<span class="material-symbols-outlined text-[18px]">add</span>
Register Device
</button>
</div>
</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter mb-xl items-stretch">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h3 class="font-title-md text-title-md font-bold">Device Sessions</h3>
<span class="font-data-mono text-data-mono text-on-surface-variant">{{deviceCount}} devices</span>
</div>
<div class="overflow-x-auto flex-1">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
<tr>
<th class="px-lg py-sm font-semibold">Device ID</th>
<th class="px-lg py-sm font-semibold">Name</th>
<th class="px-lg py-sm font-semibold">User</th>
<th class="px-lg py-sm font-semibold">Last Sync</th>
<th class="px-lg py-sm font-semibold text-center">Status</th>
<th class="px-lg py-sm font-semibold text-center">Actions</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{deviceRows}}
</tbody>
</table>
</div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col shadow-sm">
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h3 class="font-title-md text-title-md font-bold">Sync Logs</h3>
<span class="font-data-mono text-data-mono text-on-surface-variant">{{syncCount}} entries</span>
</div>
<div class="overflow-x-auto flex-1">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-container-low text-label-md font-label-md text-on-surface-variant uppercase tracking-wider border-b border-outline-variant">
<tr>
<th class="px-lg py-sm font-semibold">Timestamp</th>
<th class="px-lg py-sm font-semibold">Device</th>
<th class="px-lg py-sm font-semibold">Action</th>
<th class="px-lg py-sm font-semibold text-center">Status</th>
</tr>
</thead>
<tbody class="divide-y divide-outline-variant">
{{syncRows}}
</tbody>
</table>
</div>
</div>
</div>
</div>
