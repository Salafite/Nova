<!DOCTYPE html>

<html dir="ltr" lang="en"><head>
<meta charset="utf-8"/>

                    "inverse-on-surface": "#edf0ff",
                    "surface-container-high": "#e1e8fd",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9ff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .press-effect:active {
            transform: translateY(1px);
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #451ebb;
            box-shadow: 0 0 0 2px rgba(69, 30, 187, 0.3);
        }
        /* RTL support for Odoo-style layouts */
        [dir="rtl"] .font-headline-lg-mobile {
            font-family: 'Inter', sans-serif; /* Fallback for Arabic system fonts usually preferred */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Header Section -->
<header class="w-full px-margin-mobile h-20 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">Nova ERP</h1>
</div>
<!-- Language Toggle -->
<button class="flex items-center gap-1 px-3 py-2 rounded-lg hover:bg-surface-container-low transition-colors text-primary font-label-md text-label-md" id="lang-toggle">
<span class="material-symbols-outlined text-[18px]">language</span>
<span id="lang-label">EN</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-mobile pt-8 pb-12">
<div class="w-full max-w-sm mx-auto">
<!-- Welcome Text -->
<div class="mb-8">
<h2 class="font-title-md text-title-md text-on-surface mb-2" id="login-title">Sign in to your account</h2>
<p class="font-body-md text-body-md text-on-surface-variant" id="login-subtitle">Access your enterprise dashboard</p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Username Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant" for="email" id="label-email">Email or Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md font-body-md input-focus-ring transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="e.g. john.doe@company.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password" id="label-password">Password</label>
<a class="text-primary font-label-md text-label-md hover:underline" href="#" id="link-forgot">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md font-body-md input-focus-ring transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-outline transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me (High-Density pattern) -->
<div class="flex items-center gap-2 py-2">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface" for="remember" id="label-remember">Keep me signed in</label>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-primary text-on-primary font-title-md text-title-md rounded-lg shadow-sm hover:brightness-110 active:scale-[0.98] transition-all press-effect" type="submit">
<span id="btn-signin">Sign In</span>
</button>
</form>
<!-- Bottom Illustration/Visual Context -->
<div class="mt-12 opacity-50">
<div class="h-[1px] w-full bg-outline-variant mb-8"></div>
<div class="grid grid-cols-3 gap-4">
<div class="h-12 bg-surface-container rounded flex items-center justify-center">
<span class="material-symbols-outlined text-outline">inventory_2</span>
</div>
<div class="h-12 bg-surface-container rounded flex items-center justify-center">
<span class="material-symbols-outlined text-outline">analytics</span>
</div>
<div class="h-12 bg-surface-container rounded flex items-center justify-center">
<span class="material-symbols-outlined text-outline">settings</span>
</div>
</div>
</div>
</div>
</main>
<!-- Footer Meta -->
<footer class="w-full p-margin-mobile text-center">
<p class="font-label-md text-label-md text-outline-variant">v4.2.0 • Corporate Modernism Architecture</p>
</footer>
<!-- Interactive Layer -->
<script>
        const langToggle = document.getElementById('lang-toggle');
        const langLabel = document.getElementById('lang-label');
        const htmlTag = document.documentElement;
        
        const translations = {
            en: {
                title: "Sign in to your account",
                subtitle: "Access your enterprise dashboard",
                email: "Email or Username",
                pass: "Password",
                forgot: "Forgot password?",
                remember: "Keep me signed in",
                signin: "Sign In",
                lang: "EN"
            },
            ar: {
                title: "تسجيل الدخول إلى حسابك",
                subtitle: "الوصول إلى لوحة تحكم المؤسسة",
                email: "البريد الإلكتروني أو اسم المستخدم",
                pass: "كلمة المرور",
                forgot: "نسيت كلمة المرور؟",
                remember: "تذكرني",
                signin: "تسجيل الدخول",
                lang: "AR"
            }
        };

        langToggle.addEventListener('click', () => {
            const isEn = htmlTag.dir === 'ltr';
            const newLang = isEn ? 'ar' : 'en';
            
            htmlTag.dir = isEn ? 'rtl' : 'ltr';
            htmlTag.lang = newLang;
            
            const t = translations[newLang];
            document.getElementById('login-title').innerText = t.title;
            document.getElementById('login-subtitle').innerText = t.subtitle;
            document.getElementById('label-email').innerText = t.email;
            document.getElementById('label-password').innerText = t.pass;
            document.getElementById('link-forgot').innerText = t.forgot;
            document.getElementById('label-remember').innerText = t.remember;
            document.getElementById('btn-signin').innerText = t.signin;
            langLabel.innerText = t.lang;

            // Handle icon positioning in RTL
            const icons = document.querySelectorAll('.material-symbols-outlined');
            if (newLang === 'ar') {
                document.getElementById('email').classList.replace('pl-10', 'pr-10');
                document.getElementById('email').classList.replace('pr-4', 'pl-4');
                document.getElementById('password').classList.replace('pl-10', 'pr-10');
                document.getElementById('password').classList.replace('pr-12', 'pl-12');
                
                // Adjust position of absolute icons manually or via class swap if needed
                document.querySelectorAll('.absolute.left-3').forEach(el => el.classList.replace('left-3', 'right-3'));
                document.querySelectorAll('.absolute.right-3').forEach(el => {
                    if(!el.classList.contains('left-3')) el.classList.replace('right-3', 'left-3');
                });
            } else {
                document.getElementById('email').classList.replace('pr-10', 'pl-10');
                document.getElementById('email').classList.replace('pl-4', 'pr-4');
                document.getElementById('password').classList.replace('pr-10', 'pl-10');
                document.getElementById('password').classList.replace('pl-12', 'pr-12');
                
                document.querySelectorAll('.absolute.right-3').forEach(el => {
                   if (!el.closest('button')) el.classList.replace('right-3', 'left-3');
                });
                document.querySelectorAll('.absolute.left-3').forEach(el => {
                   if (el.closest('button')) el.classList.replace('left-3', 'right-3');
                });
            }
        });
    </script>
</body></html>
