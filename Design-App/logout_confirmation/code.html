<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }
        
        .press-effect:active {
            transform: translateY(1px);
        }

            backdrop-filter: blur(4px);
        }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- TopAppBar (Based on Shared Components) -->
<header class="bg-surface dark:bg-background flex items-center justify-between px-margin-mobile w-full h-16 fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-low p-2 rounded-full transition-colors active:translate-y-px">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed font-bold">Nova ERP</span>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">person</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile pt-16 pb-20 relative">
<!-- Atmospheric Background Detail -->
<div class="absolute inset-0 bento-glow pointer-events-none"></div>
<!-- Confirmation Dialog Card -->
<div class="w-full max-w-sm bg-surface-container-lowest border border-outline-variant rounded-xl p-lg flex flex-col items-center text-center">
<!-- Branding Icon / Visual Anchor -->
<div class="w-16 h-16 bg-primary-fixed rounded-full flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-primary text-[32px]">logout</span>
</div>
<!-- Content -->
<h1 class="font-title-md text-title-md text-on-surface mb-sm">Sign Out</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl px-4">
                Are you sure you want to log out of Nova ERP? Any unsaved changes in your active session may be lost.
            </p>
<!-- Action Buttons -->
<div class="flex flex-col w-full gap-md">
<!-- Primary / Destructive -->
<button class="press-effect w-full py-4 bg-primary text-on-primary rounded-lg font-title-md transition-all hover:brightness-95 flex items-center justify-center gap-2" id="logoutBtn">
                    Sign Out
                </button>
<!-- Secondary / Cancel -->
<button class="press-effect w-full py-4 border border-primary text-primary bg-surface rounded-lg font-title-md transition-all hover:bg-surface-container-low">
                    Cancel
                </button>
</div>
<!-- Footer Meta -->
<div class="mt-xl">
<span class="font-label-md text-label-md text-outline">Nova Enterprise v4.2.0</span>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed for Transactional/Focused Journey, but kept template logic as guide) -->
<!-- Not rendered as per "Relevance Check: Suppress if page is Transactional" Rule -->
<!-- Success Feedback Overlay (Hidden Initially) -->
<div class="fixed inset-0 z-[100] bg-surface flex flex-col items-center justify-center px-margin-mobile hidden" id="successOverlay">
<div class="text-center">
<div class="w-20 h-20 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center mx-auto mb-lg scale-0 transition-transform duration-500 ease-out" id="checkCircle">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm opacity-0 transition-opacity duration-500 delay-300" id="successTitle">Logged Out</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-xl opacity-0 transition-opacity duration-500 delay-500" id="successMsg">You have been successfully signed out of your session.</p>
<button class="press-effect w-full max-w-xs py-4 bg-primary text-on-primary rounded-lg font-title-md opacity-0 transition-opacity duration-500 delay-700" id="signInBtn">
                Back to Sign In
            </button>
</div>
</div>
<!-- Scripting for UI Interactions -->
<script>
        document.getElementById('logoutBtn').addEventListener('click', function() {
            const overlay = document.getElementById('successOverlay');
            const circle = document.getElementById('checkCircle');
            const title = document.getElementById('successTitle');
            const msg = document.getElementById('successMsg');
            const btn = document.getElementById('signInBtn');

            // Show Overlay
            overlay.classList.remove('hidden');
            
            // Trigger Animations
            setTimeout(() => {
                circle.classList.remove('scale-0');
                circle.classList.add('scale-100');
            }, 100);

            setTimeout(() => {
                title.classList.remove('opacity-0');
                msg.classList.remove('opacity-0');
                btn.classList.remove('opacity-0');
            }, 400);
        });

        // Simple button active state toggle simulation if needed
        document.querySelectorAll('.press-effect').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('translate-y-px'));
            btn.addEventListener('mouseup', () => btn.classList.remove('translate-y-px'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('translate-y-px'));
        });
    </script>
<!-- Background Pattern Decorative Element -->
