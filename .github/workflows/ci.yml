name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
      - name: Run tests with coverage
        run: python -m pytest --cov=modules --cov=packages --cov=apps/api --cov-report=term --cov-report=xml -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-vue/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web-vue
      - name: Lint
        run: npx eslint src/ --ext .vue,.js --max-warnings 50
        working-directory: apps/web-vue
        continue-on-error: true

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-vue/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web-vue
      - name: Run unit tests
        run: npx vitest run --coverage
        working-directory: apps/web-vue

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: pip install -r apps/api/requirements.txt
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web-vue/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: apps/web-vue
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web-vue
      - name: Start backend
        run: |
          python apps/api/main.py &
          sleep 3
      - name: Build frontend
        run: npm run build
        working-directory: apps/web-vue
      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web-vue
