name: CI

on: [push, pull_request]

env:
  DB_HOST: localhost
  DB_PORT: '5432'
  DB_NAME: nova_erp
  DB_USER: nova
  DB_PASSWORD: nova_secret
  DB_SCHEMA: Nova
  DB_SSLMODE: disable
  SECRET_KEY: test-secret-key-for-ci-gh-actions-64-bytes!!

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nova_erp
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r apps/api/requirements.txt
      - name: Run migrations
        run: python scripts/run_migration.py
      - name: Run tests
        run: python -m pytest --tb=short -x -q

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web-vue/package-lock.json
      - run: npm ci
        working-directory: apps/web-vue
      - run: npm test
        working-directory: apps/web-vue

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web-vue/package-lock.json
      - run: npm ci
        working-directory: apps/web-vue
      - run: npm run build
        working-directory: apps/web-vue
