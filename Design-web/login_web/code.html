<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Nova Enterprise ERP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@450&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .press-effect:active {
            transform: translateY(1px);
        }
        .tonal-layer-1 {
            background-color: #ffffff;
            border: 1px solid #E5E7EB;
        }
        /* Custom scrollbar for high-density views */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary-fixed": "#002020",
                      "on-tertiary": "#ffffff",
                      "tertiary-fixed-dim": "#c0c7d6",
                      "on-primary-fixed-variant": "#4723be",
                      "primary-fixed-dim": "#cabeff",
                      "inverse-surface": "#293040",
                      "on-surface-variant": "#484554",
                      "on-error-container": "#93000a",
                      "primary-fixed": "#e6deff",
                      "error": "#ba1a1a",
                      "surface-container": "#e9edff",
                      "secondary-container": "#90efef",
                      "on-tertiary-fixed-variant": "#404754",
                      "surface-tint": "#6042d6",
                      "background": "#f9f9ff",
                      "surface": "#f9f9ff",
                      "tertiary": "#3d4551",
                      "surface-variant": "#dce2f7",
                      "on-error": "#ffffff",
                      "secondary": "#006a6a",
                      "surface-container-high": "#e1e8fd",
                      "surface-container-highest": "#dce2f7",
                      "surface-container-low": "#f1f3ff",
                      "on-secondary-fixed-variant": "#004f4f",
                      "on-primary": "#ffffff",
                      "tertiary-container": "#555c69",
                      "on-secondary-container": "#006e6e",
                      "on-primary-container": "#d8ceff",
                      "on-background": "#141b2b",
                      "inverse-primary": "#cabeff",
                      "on-secondary": "#ffffff",
                      "outline": "#797586",

                      "secondary-fixed": "#93f2f2",
                      "primary-container": "#5d3fd3",
                      "on-primary-fixed": "#1c0062",
                      "error-container": "#ffdad6",
                      "surface-dim": "#d3daef",
                      "on-surface": "#141b2b",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed-dim": "#76d6d5"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "max-width": "1440px",
                      "base": "4px",
                      "md": "16px",
                      "gutter": "16px",
                      "xs": "4px",
                      "xl": "32px",
                      "margin-desktop": "32px",
                      "lg": "24px",
                      "sm": "8px",
                      "margin-mobile": "16px"
              },
              "fontFamily": {
                      "headline-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "data-mono": ["JetBrains Mono"],
                      "body-md": ["Inter"],

                      "headline-lg-mobile": ["Inter"]

              }
            },
          },
        }

</head>
<body class="bg-background text-on-surface font-body-md text-body-md min-h-screen flex flex-col">
<!-- Header / TopNavBar -->
<nav class="bg-surface w-full h-16 border-b border-outline-variant flex justify-between items-center px-margin-desktop w-full max-w-max-width mx-auto">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-lg text-headline-lg font-bold text-primary">Nova Enterprise</span>
</div>
<div class="flex items-center gap-md">
<button class="flex items-center gap-xs font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high px-sm py-xs transition-colors rounded">
<span class="material-symbols-outlined text-[18px]">language</span>
<span>EN / AR</span>
</button>
<div class="h-4 w-[1px] bg-outline-variant"></div>
<a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Help</a>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-0 py-xl">
<div class="w-full max-w-[440px]">
<!-- Login Card -->
<div class="tonal-layer-1 p-xl rounded shadow-none">
<div class="mb-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Sign In</h1>
<p class="text-on-surface-variant font-body-md text-body-md">Enter your credentials to access your ERP workspace.</p>
</div>
<form class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Email/Username -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="identity">Email or Username</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-[20px]">person</span>
<input class="w-full pl-11 pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded focus:border-2 focus:border-primary focus:ring-0 transition-all outline-none text-body-md" id="identity" name="identity" placeholder="e.g. j.doe@novaenterprise.com" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-[20px]">lock</span>
<input class="w-full pl-11 pr-11 py-sm bg-surface-container-lowest border border-outline-variant rounded focus:border-2 focus:border-primary focus:ring-0 transition-all outline-none text-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary transition-colors cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="ml-sm font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Keep me signed in</label>
</div>
<!-- Actions -->
<div class="pt-base">
<button class="w-full bg-primary text-on-primary font-title-md text-title-md py-sm px-lg rounded flex items-center justify-center gap-sm press-effect hover:bg-primary-container transition-all" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<!-- SSO / Alternative Options -->
<div class="mt-xl pt-lg border-t border-outline-variant">
<p class="text-center font-label-md text-label-md text-on-surface-variant mb-md uppercase tracking-widest">Or continue with</p>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-sm px-md border border-outline-variant rounded hover:bg-surface-container-high transition-colors press-effect">
<div class="w-5 h-5 flex items-center justify-center">
<svg class="w-4 h-4" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
</div>
<span class="font-label-md text-label-md">Google</span>
</button>
<button class="flex items-center justify-center gap-sm py-sm px-md border border-outline-variant rounded hover:bg-surface-container-high transition-colors press-effect">
<span class="material-symbols-outlined text-[20px]">key</span>
<span class="font-label-md text-label-md">SSO</span>
</button>
</div>
</div>
</div>
<!-- Footer Message -->
<p class="mt-lg text-center text-on-surface-variant font-label-md text-label-md">
                Don't have an account? <a class="text-primary font-bold hover:underline" href="#">Contact your administrator</a>
</p>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-low w-full py-md border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center px-margin-desktop w-full max-w-max-width mx-auto gap-md">
<span class="font-label-md text-label-md text-secondary">© 2024 Nova Enterprise ERP. All rights reserved.</span>
<div class="flex gap-lg">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Security</a>
</div>
</div>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Add visual feedback to input fields
        const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-primary');
            });
        });
    </script>
</body></html>
