<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- Top Navigation (Restricted - No links for focused transactional state) -->
<header class="bg-surface w-full h-16 border-b border-outline-variant flex justify-between items-center px-margin-desktop w-full max-w-max-width mx-auto">

<div class="flex gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high p-sm rounded-lg transition-colors">language</button>
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high p-sm rounded-lg transition-colors">dark_mode</button>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-[calc(100vh-64px-72px)] w-full flex items-center justify-center p-gutter">
<!-- Subtle Atmospheric Background -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="w-full h-full bg-cover bg-center" data-alt="A sophisticated, high-density corporate enterprise background with abstract data visualization patterns, soft gradients of Iris Purple and deep slate gray. The lighting is clean and professional, using a minimalist corporate modernism style with 4px grid alignments and subtle structural depth." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC_A6krmt6zJoYd1OSle4hqLT-2IIkFbSx6nbqlE9-T1Ir1kgzU5v8whMQNtsniwwH511SEBg7Ir4tINbinqeh14xq_S9taKxeV4XaxfwektAXFqSonoi_qsK6xwS7l-6VYTEoYAah_VfObBE4wlmpIJ9eHMFf4lVWXKzutlKUcYWM5DukeCXur327Kn01HaDgZIlQD7wEMsjEzM4vB4JCD9uq-_3yVdpfklShpRlgEaEf5qRjsrlTIXoe_Zlw_WsCoT4oOV7jSiRQ')"></div>
</div>
<!-- Logout Modal Shell -->
<div class="relative z-10 w-full max-w-[480px] animate-in fade-in zoom-in duration-300">
<div class="bg-surface border border-outline-variant shadow-lg rounded-xl overflow-hidden">
<!-- Modal Header Area with Illustration -->
<div class="bg-surface-container-low p-xl flex flex-col items-center gap-lg border-b border-outline-variant">
<div class="w-20 h-20 bg-primary-fixed-dim rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined !text-[48px]" style="font-variation-settings: 'FILL' 1;">logout</span>
</div>
<div class="text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Sign Out</h1>
<p class="font-body-md text-on-surface-variant max-w-[320px] mx-auto">
                            Are you sure you want to log out? Any unsaved changes may be lost.
                        </p>
</div>
</div>
<!-- Action Buttons -->
<div class="p-lg flex flex-col gap-sm">
<button class="w-full bg-primary text-on-primary font-title-md py-md rounded-lg press-effect hover:bg-primary-container transition-colors font-semibold">
                        Sign Out
                    </button>
<button class="w-full bg-white border border-primary text-primary font-title-md py-md rounded-lg press-effect hover:bg-surface-container-high transition-colors font-semibold">
                        Cancel
                    </button>
</div>
<!-- Security Assurance -->
<div class="bg-surface-container-lowest px-lg py-md border-t border-outline-variant flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary text-[18px]">verified_user</span>
<span class="font-label-md text-on-surface-variant uppercase tracking-wider">Secure Session Termination</span>
</div>
</div>
<!-- Secondary Context info -->
<div class="mt-lg text-center">
<p class="font-label-md text-on-surface-variant">Logged in as <span class="font-bold text-on-surface">admin_executive@nova.erp</span></p>
</div>
</div>
</main>
<!-- Footer (Restricted) -->
<footer class="bg-surface-container-low border-t border-outline-variant w-full h-[72px] flex flex-col md:flex-row justify-between items-center px-margin-desktop w-full max-w-max-width mx-auto gap-md">

<a class="font-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Security</a>
</div>
</footer>
<script>
        // Micro-interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if(btn.innerText === 'Cancel') {
                    // Simulated navigation back
                    window.history.back();
                } else if (btn.innerText === 'Sign Out') {
                    // Logic for sign out
                    btn.innerHTML = '<span class="animate-spin material-symbols-outlined">sync</span> Signing out...';
                    btn.classList.add('opacity-80', 'pointer-events-none');
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                }
            });
        });
    </script>
