version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova_erp}
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova_erp"]
      interval: 10s
      retries: 5

  api:
    build: .
    ports:
      - "8070:8070"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-nova_erp}
      DB_USER: ${DB_USER:-nova}
      DB_PASSWORD: ${DB_PASSWORD:-nova_secret}
      DB_SCHEMA: "Nova"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      ALLOWED_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
